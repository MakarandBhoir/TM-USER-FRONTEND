<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Navigation Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>User Management</h1>
            </div>
            <nav class="nav">
                <ul>
                    <li><a href="#users" class="nav-link active">Users</a></li>
                    <li><a href="#" class="nav-link">Documentation</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-card">
                <h3>Quick Stats</h3>
                <div class="stat-item">
                    <span class="stat-label">Total Users</span>
                    <span class="stat-value" id="totalUsers">0</span>
                </div>
            </div>
        </aside>

        <!-- Main Panel -->
        <section class="content-panel">
            <!-- Create User Form -->
            <div class="card">
                <div class="card-header">
                    <h2 id="formTitle">Add New User</h2>
                </div>
                <div class="card-body">
                    <form id="createUserForm" class="form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name *</label>
                                <input type="text" id="firstName" name="firstName" placeholder="Enter first name"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name *</label>
                                <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input type="email" id="email" name="email" placeholder="Enter email address" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone</label>
                                <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <span class="btn-text">Create User</span>
                                <span class="btn-loader hidden">Loading...</span>
                            </button>
                            <button type="reset" class="btn btn-secondary" id="resetBtn">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Users List Section -->
            <div class="card">
                <div class="card-header">
                    <h2>Users List</h2>
                    <button id="refreshBtn" class="btn btn-outline">
                        <span class="refresh-icon">↻</span> Refresh
                    </button>
                </div>
                <div class="card-body">
                    <!-- Loading State -->
                    <div id="loadingState" class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading users...</p>
                    </div>

                    <!-- Error State -->
                    <div id="errorState" class="error-state hidden">
                        <div class="error-icon">⚠</div>
                        <p id="errorMessage">An error occurred while loading users</p>
                        <button id="retryBtn" class="btn btn-secondary">Retry</button>
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state hidden">
                        <div class="empty-icon">👥</div>
                        <p>No users found</p>
                        <p class="empty-description">Create your first user above to get started</p>
                    </div>

                    <!-- Users Table -->
                    <div id="tableContainer" class="table-container hidden">
                        <table class="users-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Created At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Users will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Notification Toast -->
    <div id="notification" class="notification hidden"></div>

    <!-- Scripts -->
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>

</html>
